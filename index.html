<!DOCTYPE html>
<html>
<head>
  <title>Minecraft Control</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    #panel, #auth {
      margin-top: 50px;
      padding: 20px;
      background: #1e293b;
      border-radius: 12px;
      width: 300px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    input, button {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    #status {
      margin-top: 10px;
      font-weight: bold;
    }

    .online { color: #22c55e; }
    .offline { color: #ef4444; }
    .starting { color: #f59e0b; }
    .stopping { color: #f59e0b; }
  </style>
</head>
<body>

<h1>Minecraft Server Control</h1>

<div id="auth">
  <h3>Login</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none;">
  <h3>Control Panel</h3>

  <div id="status">Status: loading...</div>

  <button onclick="startServer()">Start</button>
  <button onclick="stopServer()">Stop</button>
  <button onclick="restartServer()">Restart</button>
  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "minecraft-server-control-1c905.firebaseapp.com",
  databaseURL: "https://minecraft-server-control-1c905-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "minecraft-server-control-1c905",
  storageBucket: "minecraft-server-control-1c905.firebasestorage.app",
  messagingSenderId: "222712254483",
  appId: "1:222712254483:web:a27617a34af2578eb12fe6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

window.login = async function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  await signInWithEmailAndPassword(auth, email, password);
}

window.logout = function() {
  signOut(auth);
}

window.startServer = function() {
  set(ref(db, 'server/command'), 'start');
}

window.stopServer = function() {
  set(ref(db, 'server/command'), 'stop');
}

window.restartServer = function() {
  set(ref(db, 'server/command'), 'restart');
}

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("auth").style.display = "none";
    document.getElementById("panel").style.display = "block";
  } else {
    document.getElementById("auth").style.display = "block";
    document.getElementById("panel").style.display = "none";
  }
});

const statusRef = ref(db, 'server/status');

onValue(statusRef, (snapshot) => {
  const status = snapshot.val();
  const el = document.getElementById("status");
  el.innerText = "Status: " + status;

  el.className = status;
});
</script>

</body>
</html>
